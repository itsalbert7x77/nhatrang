baseURL = "https://nhatrang.pages.dev/"
theme = "notebook"
enableRobotsTXT = true
buildFuture = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  description = "The definitive notebook-style guide to dental clinics, treatments, and dental tourism in Nha Trang, Vietnam. Verified pricing, clinic comparisons, and travel tips."
  author = "Nha Trang Dental Guide"
  mainSite = "https://smilejet.app"
  mainSiteName = "SmileJet"
  locale = "en_US"

[sitemap]
  changeFreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    title = "Nha Trang Dental Guide — Your Notebook to Dental Care in Nha Trang"
    weight = 1
    [languages.en.params]
      locale = "en_US"

  [languages.ru]
    languageCode = "ru"
    languageName = "Русский"
    title = "Стоматология в Нячанге — Полный гид по лечению зубов"
    weight = 2
    [languages.ru.params]
      locale = "ru_RU"
      description = "Полный гид по стоматологическим клиникам, процедурам и стоматологическому туризму в Нячанге, Вьетнам. Проверенные цены, сравнение клиник и советы для путешественников."

  [languages.ko]
    languageCode = "ko"
    languageName = "한국어"
    title = "나트랑 치과 가이드 — 베트남 나트랑 치과 관광 안내"
    weight = 3
    [languages.ko.params]
      locale = "ko_KR"
      description = "베트남 나트랑의 치과 클리닉, 치료, 치과 관광에 대한 완벽한 가이드. 검증된 가격, 클리닉 비교, 여행 팁."

